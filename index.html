const INIT_POLL = { id:9999, date:"2026-05-13", agency:"(자료 기입)", ppp:39.6, dp:38.9, undecided:21.5, n:0, note:"2026.5.13 기준" };

function App() {
  const [tab, setTab]         = useState("dashboard");
  const [polls, setPolls]     = useState([]);
  const [party, setParty]     = useState([]);
  const [ready, setReady]     = useState(false);
  const [turnoutInput, setTurnoutInput] = useState(41);
  const [showCorrection, setShowCorrection] = useState(false);
  const [partyWeight, setPartyWeight] = useState(4);
  const [electionChar, setElectionChar] = useState(40);
  const [incumbentBonus, setIncumbentBonus] = useState(6);

  const [pf, setPf] = useState({ date: new Date().toISOString().split("T")[0], agency:"", ppp:"", dp:"", undecided:"", n:"", note:"" });
  const [qf, setQf] = useState({ date: new Date().toISOString().split("T")[0], pppAnsan:"", dpAnsan:"", pppNat:"", dpNat:"", pppGG:"", dpGG:"", src:"" });

  const inp = "bg-slate-700 text-white text-sm px-3 py-2 rounded-lg border border-slate-600 focus:border-blue-400 focus:outline-none w-full";
  const lbl = "block text-xs text-slate-400 mb-1";

  const [saveStatus, setSaveStatus] = useState("");
  const settingsLoadedRef = useRef(false);

  // load storage
  useEffect(() => {
    try {
      const r = localStorage.getItem("v3-polls");
      if(r) setPolls(JSON.parse(r));
      else setPolls([INIT_POLL]);
    } catch { setPolls([INIT_POLL]); }

    try {
      const r = localStorage.getItem("v3-party");
      if(r) setParty(JSON.parse(r));
    } catch {}

    try {
      const r = localStorage.getItem("v3-settings");
      if(r) {
        const s = JSON.parse(r);
        if(s.electionChar !== undefined) setElectionChar(s.electionChar);
        if(s.incumbentBonus !== undefined) setIncumbentBonus(s.incumbentBonus);
        if(s.turnoutInput !== undefined) setTurnoutInput(s.turnoutInput);
        if(s.showCorrection !== undefined) setShowCorrection(s.showCorrection);
      }
    } catch {}

    settingsLoadedRef.current = true;
    setReady(true);
  }, []);

  useEffect(() => {
    if (!ready || !settingsLoadedRef.current) return;
    localStorage.setItem("v3-settings", JSON.stringify({
      electionChar, incumbentBonus, turnoutInput, showCorrection
    }));
  }, [electionChar, incumbentBonus, turnoutInput, showCorrection]);

  const saveSettings = (overrides = {}) => {
    if (!settingsLoadedRef.current) return;
    const s = {
      electionChar, incumbentBonus, turnoutInput, showCorrection,
      ...overrides
    };
    localStorage.setItem("v3-settings", JSON.stringify(s));
  };

  const savePoll = (updated) => {
    setPolls(updated);
    try { localStorage.setItem("v3-polls", JSON.stringify(updated)); }
    catch(e) { console.error("polls 저장 실패", e); }
  };

  const saveParty = (updated) => {
    setParty(updated);
    try {
      localStorage.setItem("v3-party", JSON.stringify(updated));
      setSaveStatus("✅ 저장됨");
      setTimeout(() => setSaveStatus(""), 2000);
    } catch(e) {
      console.error("party 저장 실패", e);
      setSaveStatus("⚠️ 저장 실패");
      setTimeout(() => setSaveStatus(""), 3000);
    }
  };

  const addPoll = () => {
    if(!pf.agency || !pf.ppp || !pf.dp) return;
    const row = { id:Date.now(), ...pf, ppp:+pf.ppp, dp:+pf.dp, undecided:+pf.undecided||0, n:+pf.n||0 };
    const u = [...polls, row].sort((a,b)=>a.date.localeCompare(b.date));
    savePoll(u);
    setPf(f=>({...f, agency:"", ppp:"", dp:"", undecided:"", n:"", note:""}));
  };
  const delPoll = (id) => savePoll(polls.filter(p=>p.id!==id));

  const addParty = () => {
    if(!qf.pppAnsan && !qf.pppNat) return;
    const row = { id:Date.now(), ...qf,
      pppAnsan:+qf.pppAnsan||0, dpAnsan:+qf.dpAnsan||0,
      pppNat:+qf.pppNat||0, dpNat:+qf.dpNat||0,
      pppGG:+qf.pppGG||0, dpGG:+qf.dpGG||0 };
    const u = [...party, row].sort((a,b)=>a.date.localeCompare(b.date));
    saveParty(u);
    setQf(f=>({...f, pppAnsan:"", dpAnsan:"", pppNat:"", dpNat:"", pppGG:"", dpGG:"", src:""}));
  };
  const delParty = (id) => saveParty(party.filter(p=>p.id!==id));

  // ── 선거성격 지수 → 이민근 순 보정값 계산 ───────────────────
  const calcElectionAdj = (x) => {
    const incumbentRate = x <= 40 ? x / 40 : Math.max(0, 1 - (x - 40) / 60);
    const incumbentEffect = incumbentBonus * incumbentRate;

    let partyEffect = 0;
    if (party.length > 0) {
      const lat = party[party.length - 1];
      const cp = lat.pppAnsan > 0 ? lat.pppAnsan : (lat.pppGG || lat.pppNat);
      const cd = lat.dpAnsan > 0 ? lat.dpAnsan : (lat.dpGG || lat.dpNat);
      if (cp > 0 && cd > 0) {
        const partyGap = (cp - 50.4) - (cd - 49.6);
        const partyRate = Math.max(0, (x - 30) / 70);
        partyEffect = partyGap * partyRate * 0.15;
      }
    }
    return incumbentEffect + partyEffect;
  };

  // ── 투표율 보정값 계산 (실측 기반) ──────────────────────────
  const calcTurnoutAdj = (t) => {
    const baseline = 42;
    if (t >= baseline) {
      return Math.min((t - baseline) * 0.625, 14);
    } else {
      return Math.max((t - baseline) * 1.43, -12);
    }
  };

  // ── 예측 모델 ────────────────────────────────────────────────
  const calcPred = () => {
    let ppp = 50, dp = 50;
    const bk = [];

    // 1) 여론조사 가중 평균 (70% 고정)
    if (polls.length > 0) {
      const recent = polls.slice(-5);
      const n = recent.length;
      const weights = recent.map((_, i) => i + 1);
      const totalW = weights.reduce((s, w) => s + w, 0);
      const ap = recent.reduce((s, r, i) => s + r.ppp * weights[i], 0) / totalW;
      const ad = recent.reduce((s, r, i) => s + r.dp  * weights[i], 0) / totalW;
      const tot = ap + ad;
      const np = (ap / tot) * 100, nd = (ad / tot) * 100;
      ppp = ppp * 0.3 + np * 0.7; dp = dp * 0.3 + nd * 0.7;
      const wDesc = n === 1 ? "1건 (100%)"
        : n === 2 ? "최신 67%·이전 33%"
        : n === 3 ? "최신 50%·중간 33%·이전 17%"
        : n === 4 ? "최신 40%·... 가중"
        : "최신 33%·... 가중";
      bk.push({ factor: "여론조사 가중평균", weight: 70, ppp: np.toFixed(1), dp: nd.toFixed(1), basis: `최근 ${n}건 · ${wDesc}` });
    } else {
      bk.push({ factor: "여론조사 가중평균", weight: 70, ppp: "—", dp: "—", basis: "데이터 미입력" });
    }

    // 2) 역대 패턴 (15% 고정)
    ppp += 0.15 * (-0.8); dp -= 0.15 * (-0.8);
    bk.push({ factor: "역대 패턴", weight: 15, ppp: "구조 불리", dp: "지형 우세", basis: "민선5~8기 + 총선·대선" });

    // 3) 트렌드 (15% 고정)
    if (polls.length >= 2) {
      const last = polls[polls.length - 1], prev = polls[polls.length - 2];
      const tr = last.ppp - prev.ppp;
      ppp += tr * 0.15; dp -= tr * 0.15;
      bk.push({ factor: "최근 추이", weight: 15, ppp: tr >= 0 ? `+${tr.toFixed(1)}%p` : `${tr.toFixed(1)}%p`, dp: tr >= 0 ? "↓" : "↑", basis: "직전 2회 비교" });
    } else {
      bk.push({ factor: "최근 추이", weight: 15, ppp: "—", dp: "—", basis: "2건 이상 필요" });
    }

    // 소계 정규화
    const tot = ppp + dp;
    let fp = (ppp / tot) * 100, fd = (dp / tot) * 100;

    // 4) 선거 성격 지수 보정
    const elAdj = calcElectionAdj(electionChar);
    fp = Math.max(fp + elAdj * 0.5, 1);
    fd = Math.max(fd - elAdj * 0.5, 1);
    const tot2 = fp + fd;
    fp = (fp / tot2) * 100; fd = (fd / tot2) * 100;

    const elZone = electionChar <= 40 ? `현직 프리미엄 구간 (${elAdj > 0 ? "+" : ""}${elAdj.toFixed(1)}%p 이민근)`
      : electionChar <= 65 ? `균형 구간 (${elAdj > 0 ? "+" : ""}${elAdj.toFixed(1)}%p)`
      : `정당 지형 구간 (${Math.abs(elAdj).toFixed(1)}%p 천영미)`;
    bk.push({ factor: "선거성격 보정", weight: "직접", ppp: elAdj >= 0 ? `+${(elAdj * 0.5).toFixed(1)}` : `${(elAdj * 0.5).toFixed(1)}`, dp: elAdj >= 0 ? `↓` : `+${(Math.abs(elAdj) * 0.5).toFixed(1)}`, basis: elZone });

    // 5) 투표율 보정
    const tAdj = calcTurnoutAdj(turnoutInput);
    fp = Math.max(fp - tAdj * 0.5, 1);
    fd = Math.max(fd + tAdj * 0.5, 1);
    const tot3 = fp + fd;
    fp = (fp / tot3) * 100; fd = (fd / tot3) * 100;
    const tLabel = tAdj >= 0
      ? `민주 +${(tAdj * 0.5).toFixed(1)}%p (투표율 ${turnoutInput}%)`
      : `국힘 +${Math.abs(tAdj * 0.5).toFixed(1)}%p (투표율 ${turnoutInput}%)`;
    bk.push({ factor: "투표율 보정", weight: "직접", ppp: tAdj >= 0 ? `↓${(tAdj * 0.5).toFixed(1)}` : `+${Math.abs(tAdj * 0.5).toFixed(1)}`, dp: tAdj >= 0 ? `+${(tAdj * 0.5).toFixed(1)}` : `↓${Math.abs(tAdj * 0.5).toFixed(1)}`, basis: tLabel });

      fpCorr = (recent.reduce((s, r) => s + r.ppp, 0) / recent.length / adjTot) * 100;
      fdCorr = (adjD / adjTot) * 100;
    }
    return { ppp: fp, dp: fd, pppCorr: fpCorr, dpCorr: fdCorr, breakdown: bk };

              <div key={r.type} className="bg-slate-700 rounded-xl p-3 mb-2">

                  <span className={`shrink-0 text-xs font-bold px-2 py-0.5 rounded ${r.type.includes("민주")?"bg-blue-800 text-blue-200":r.type.includes("경합")?"bg-yellow-800 text-yellow-200":"bg-red-900 text-red-200"}`}>{r.type}</span>
                  <div>
                    <div className="text-xs text-slate-200 font-medium">{r.dongs}</div>
                    <div className="text-xs text-slate-400 mt-0.5">{r.strategy}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </>}

        {/* ═══════════════ 역대 결과 ═══════════════ */}
        {tab==="history" && <>
          <div className="bg-slate-800 rounded-2xl p-4 border border-slate-700">
            <h2 className="font-bold text-slate-200 text-sm mb-3">📜 안산 주요 선거 결과 (2018~2025)</h2>
            {[
              {label:"2018 지선", turnout:50.3, dp:58.0, ppp:24.8, others:17.2, winner:"DP", gap:+22.5, note:"윤화섭(민주) 압승"},
              {label:"2020 총선", turnout:72.0, dp:null, ppp:null, gap:+11.6, winner:"DP", note:"4개 선거구 민주 우세"},
              {label:"2022 대선", turnout:93.5, dp:null, ppp:null, gap:-12.3, winner:"PPP", note:"안산도 윤석열 소폭 우세"},
              {label:"2022 지선", turnout:42.6, dp:46.4, ppp:46.5, others:6.5, winner:"PPP", gap:-0.1, note:"이민근(국힘) 0.1%p 신승"},
              {label:"2024 총선", turnout:75.7, dp:null, ppp:null, gap:+11.3, winner:"DP", note:"3개 선거구 민주 석권"},
              {label:"2025 대선", turnout:95.2, dp:null, ppp:null, gap:+16.5, winner:"DP", note:"이재명(민주) 대승"},
            ].map((e,i)=>(
              <div key={i} className={`rounded-xl p-3 mb-2 border ${e.winner==="PPP"?"border-red-800 bg-red-950":"border-blue-800 bg-blue-950"}`}>
                <div className="flex items-center justify-between mb-1.5">
                  <span className="font-bold text-sm text-white">{e.label}</span>
                  <div className="flex gap-2 text-xs">
                    <span className="text-slate-400">투표율 {e.turnout}%</span>
                    <span className="font-bold" style={{color:e.gap>=0?DP:PPP}}>격차 {e.gap>0?"+":""}{e.gap}%p</span>
                  </div>
                </div>
                {e.dp && e.ppp ? (
                  <div className="h-5 rounded-lg overflow-hidden flex text-xs">
                    <div style={{width:`${e.dp}%`,background:DP}} className="flex items-center justify-center text-white font-bold">민주 {e.dp}%</div>
                    <div style={{width:`${e.ppp}%`,background:PPP}} className="flex items-center justify-center text-white font-bold">국힘 {e.ppp}%</div>
                    {e.others&&<div style={{width:`${e.others}%`,background:"#64748b",fontSize:9}} className="flex items-center justify-center text-white">기타 {e.others}%</div>}
                  </div>
                ) : (
                  <div className="h-5 rounded-lg flex items-center px-2 text-xs text-slate-300" style={{background:e.winner==="DP"?DP+"33":PPP+"33"}}>{e.note}</div>
                )}
                <div className="text-xs text-slate-400 mt-1">{e.note}</div>
              </div>
            ))}
          </div>

          <div className="bg-slate-800 rounded-2xl p-4 border border-yellow-700">
            <h2 className="font-bold text-yellow-400 text-sm mb-3">🔑 투표율과 선거 결과의 관계</h2>
            <div className="grid grid-cols-2 gap-3 text-xs">
              <div className="bg-red-950 border border-red-800 rounded-xl p-3">
                <div className="font-bold text-red-300 mb-1">저투표율 (40% 미만) → 국힘 유리</div>
                <ul className="text-slate-300 space-y-0.5 list-disc list-inside">
                  <li>조직 지지층만 투표</li>
                  <li>반월동·성포동·해양동 등 높은 투표율 국힘 동이 좌우</li>
                  <li>민주 강세 동(사동·본오1동·와동·일동) 참여 저조</li>
                  <li>2022 지선 42.6% → 국힘 0.1%p 신승</li>
                </ul>
              </div>
              <div className="bg-blue-950 border border-blue-800 rounded-xl p-3">
                <div className="font-bold text-blue-300 mb-1">고투표율 (50% 이상) → 민주 유리</div>
                <ul className="text-slate-300 space-y-0.5 list-disc list-inside">
                  <li>민주 지지층 대거 참여</li>
                  <li>사동·본오1동·와동·일동 절대 득표수 폭증</li>
                  <li>민주 강세 동의 구조적 우세 실제 득표로 전환</li>
                  <li>2018 지선 50.3% → 민주 +22.5%p 압승</li>
                </ul>
              </div>
            </div>
            <div className="mt-3 bg-slate-700 rounded-xl px-3 py-2 text-xs text-center text-yellow-300 font-bold">
              분기점: 투표율 50% — 이 선을 넘으면 민주 구조적 우세가 실제 득표로 전환
            </div>
          </div>

          <div className="bg-red-950 rounded-2xl p-4 border border-red-800">
            <h2 className="font-bold text-red-300 text-sm mb-2">⚠️ 2022 국힘 승리 원인 분석</h2>
            <ul className="text-xs text-slate-300 space-y-1 list-disc list-inside">
              <li>저투표율 구조(42.6%): 민주 느슨한 지지층 대거 이탈</li>
              <li>무소속 윤화섭 6.5% 출마 → 민주 성향 표 분산 <strong className="text-yellow-300">(2026에는 없음)</strong></li>
              <li>2022.3 대선 패배 직후 민주 침체 분위기</li>
              <li>결론: 안산 구조적 민주 우세가 지방선거에서 자동 작동하지 않음을 증명</li>
            </ul>
            <div className="mt-2 text-xs text-slate-400 bg-slate-800 rounded-lg px-3 py-2">
              2026 차이: 현직 프리미엄(국힘)↑ vs 무소속 없음+탄핵국면(민주)↑ → 구조는 다르지만 초박빙 예상
            </div>
          </div>
        </>}


      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
